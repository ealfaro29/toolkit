<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>vgtools.pro — Professional Design Toolkit</title>
    <style>
        :root {
            --accent-color: #FF6B35;
            --accent-color-tint: #FFE5DC;
            --color-text-primary-light: #1C1C1E;
            --color-text-secondary-light: #3A3A3C;
            --color-surface-light: #F5F5F7;
            --color-background-light: #FFFFFF;
            --color-divider-light: #EAEAEA;
            --color-text-primary-dark: #EAEAEB;
            --color-text-secondary-dark: #9A9A9E;
            --color-surface-dark: #121212;
            --color-background-dark: #1E1E1E;
            --color-divider-dark: #3A3A3C;
            --color-accent-text: #FFFFFF;
            --font-family-sans: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
            --font-size-h1: 20px;
            --font-size-body: 14px;
            --font-size-caption: 12px;
            --font-weight-emphasis: 600;
            --font-weight-medium: 500;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 24px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-xl: 16px;
            --shadow-raised-2: 0 4px 12px rgba(0, 0, 0, .06);
            --shadow-floating-3: 0 8px 20px rgba(0, 0, 0, .12);
            --duration-standard: 200ms;
        }

        html[data-theme="light"] {
            --ink: var(--color-text-primary-light);
            --muted: var(--color-text-secondary-light);
            --surface: var(--color-surface-light);
            --surface-alt: var(--color-background-light);
            --border-color: var(--color-divider-light);
            --panel-shadow: var(--shadow-raised-2);
            color-scheme: light;
        }

        html[data-theme="dark"] {
            --ink: var(--color-text-primary-dark);
            --muted: var(--color-text-secondary-dark);
            --surface: var(--color-surface-dark);
            --surface-alt: var(--color-background-dark);
            --border-color: var(--color-divider-dark);
            --panel-shadow: 0 4px 12px rgba(0, 0, 0, .3);
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            color: var(--ink);
            background-color: var(--surface);
            font: var(--font-size-body)/1.5 var(--font-family-sans);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Pattern background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--announcement-pattern-image, url('pattern.jpg')) repeat;
            background-size: 400px 400px;
            opacity: 0.4;
            z-index: -1;
        }

        /* Liquid Glass - Light Theme */
        html[data-theme="light"] .announcement-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.45) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.9),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Liquid Glass - Dark Theme */
        html[data-theme="dark"] .announcement-card {
            background: linear-gradient(145deg, rgba(30, 30, 40, 0.75) 0%, rgba(20, 20, 30, 0.45) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.5),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .announcement-card {
            display: flex;
            width: 850px;
            max-width: 92vw;
            height: 560px;
            max-height: 90vh;
            padding: 20px;
            gap: 24px;
            overflow: hidden;
            border-radius: 40px;
            position: relative;
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .card-image {
            flex: 1.2;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent !important;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 32px;
            opacity: 0.85;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-image.assetless {
            overflow: hidden;
            border-radius: 32px;
        }

        .card-image.assetless img {
            opacity: 0;
        }

        .card-image.assetless::before {
            content: var(--announcement-emoji-wallpaper, "");
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
            font-size: clamp(30px, 4vw, 62px);
            line-height: 1.5;
            letter-spacing: 14px;
            word-spacing: 10px;
            white-space: normal;
            text-align: center;
            transform: rotate(-6deg) scale(1.06);
        }

        html[data-visual-theme="minimal"] .card-image.assetless {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 245, 247, 0.86) 100%);
            border: 1px solid rgba(17, 17, 17, 0.08);
        }

        html[data-theme="dark"][data-visual-theme="minimal"] .card-image.assetless {
            background: linear-gradient(145deg, rgba(16, 16, 20, 0.92) 0%, rgba(11, 11, 15, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        html[data-visual-theme="emoji"] .card-image.assetless {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 240, 248, 0.82) 100%);
            border: 1px solid rgba(255, 165, 108, 0.24);
        }

        html[data-theme="dark"][data-visual-theme="emoji"] .card-image.assetless {
            background: linear-gradient(145deg, rgba(43, 29, 56, 0.92) 0%, rgba(24, 18, 44, 0.88) 100%);
            border: 1px solid rgba(255, 143, 188, 0.18);
        }

        .card-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            background: transparent !important;
        }

        .card-info h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0 0 8px 0;
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 50%, #FDC830 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-info .tagline {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            opacity: 0.9;
        }

        .card-info .description {
            font-size: 15px;
            opacity: 0.85;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 500;
        }

        .feature-item span.emoji {
            display: none;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--duration-standard) ease;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
            align-self: flex-start;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
            background: #E63946;
        }

        .footer {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            opacity: 0.7;
            margin-top: auto;
        }

        #theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--ink);
            font-size: 24px;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: all var(--duration-standard) ease;
            z-index: 100;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }

        /* Text legibility on light theme */
        html[data-theme="light"] .card-info h1,
        html[data-theme="light"] .card-info .tagline {
            color: #1c1c1e;
        }

        @media(max-width: 768px) {
            .announcement-card {
                flex-direction: column;
                height: auto;
                max-height: 95vh;
                overflow-y: auto;
            }

            .card-image {
                flex: none;
                height: 200px;
            }

            .card-info h1 {
                font-size: 36px;
            }

            .card-info .tagline {
                font-size: 18px;
            }
        }
    </style>
    <script>
        // Theme management
        (function () {
            try {
                let theme = localStorage.getItem('vgtools-theme') || 'system';
                if (theme === 'system') {
                    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                }
                document.documentElement.dataset.theme = theme;
            } catch (e) { /* Gracefully handle */ }
        })();

        function cycleTheme() {
            const themes = ['light', 'dark', 'system'];
            const current = localStorage.getItem('vgtools-theme') || 'system';
            const currentIndex = themes.indexOf(current);
            const nextTheme = themes[(currentIndex + 1) % themes.length];

            localStorage.setItem('vgtools-theme', nextTheme);

            let appliedTheme = nextTheme;
            if (nextTheme === 'system') {
                appliedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }

            document.documentElement.dataset.theme = appliedTheme;
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const btn = document.getElementById('theme-toggle');
            const theme = localStorage.getItem('vgtools-theme') || 'system';
            const labels = { light: 'L', dark: 'D', system: 'A' };
            const names = { light: 'Light', dark: 'Dark', system: 'Auto' };
            btn.textContent = labels[theme] || 'A';
            btn.title = `Color theme: ${names[theme] || theme}`;
            btn.setAttribute('aria-label', `Color theme: ${names[theme] || theme}`);
        }

        function applyVisualTheme() {
            const visualTheme = localStorage.getItem('vgtools-visual-theme') || 'comicbook';
            const preview = document.getElementById('announcement-image');
            const previewWrap = preview ? preview.parentElement : null;
            const themeMeta = {
                comicbook: { usesArtwork: true, usesPattern: true },
                glassui: { usesArtwork: true, usesPattern: true },
                minimal: { usesArtwork: false, usesPattern: false },
                emoji: { usesArtwork: false, usesPattern: false, wallpaper: '✳️  🔷  🛠️  📦  ✳️  🔷  🛠️  📦  ✳️  🔷  🛠️  📦' }
            }[visualTheme] || { usesArtwork: true, usesPattern: true };
            const patternImage = `Theme/${visualTheme}/pattern_${visualTheme}.jpg`;
            const previewImage = `Theme/${visualTheme}/iconfactory_${visualTheme}.png`;

            document.documentElement.dataset.visualTheme = visualTheme;
            document.documentElement.style.setProperty('--announcement-pattern-image', themeMeta.usesPattern ? `url('${patternImage}')` : 'none');
            document.documentElement.style.setProperty('--announcement-emoji-wallpaper', JSON.stringify(themeMeta.wallpaper || ''));
            if (previewWrap) {
                previewWrap.classList.toggle('assetless', !themeMeta.usesArtwork);
            }
            if (preview && themeMeta.usesArtwork) {
                preview.src = previewImage;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateThemeIcon();
            applyVisualTheme();
            document.getElementById('theme-toggle').addEventListener('click', cycleTheme);
        });

        window.addEventListener('storage', (event) => {
            if (!event.key || event.key === 'vgtools-visual-theme') {
                applyVisualTheme();
            }
        });
    </script>
</head>

<body>
    <button id="theme-toggle" title="Change theme"></button>

    <div class="announcement-card">
        <!-- Left side: Visual -->
        <div class="card-image">
            <img id="announcement-image" src="Theme/comicbook/iconfactory_comicbook.png" alt="vgtools.pro" draggable="false">
        </div>

        <!-- Right side: Info -->
        <div class="card-info">
            <div>
                <h1>vgtools.pro</h1>
                <div class="tagline">Private. Safe. Powerful.</div>

                <p class="description">
                    Professional toolkit running entirely on your device. <strong>Nothing leaves your computer.</strong>
                </p>

                <div class="features">
                    <div class="feature-item">
                        <span class="emoji">🔒</span>
                        100% Local Processing
                    </div>
                    <div class="feature-item">
                        <span class="emoji">⚡</span>
                        Works Offline
                    </div>
                    <div class="feature-item">
                        <span class="emoji">🎨</span>
                        10+ Pro Tools
                    </div>
                </div>

                <a href="https://vgtools.pro" class="cta-button">
                    Go to vgtools.pro →
                </a>
            </div>

            <div class="footer">
                <span>Toolkit by e.</span>
                <span>·</span>
                <span>2025</span>
            </div>
        </div>
    </div>
</body>

</html>
