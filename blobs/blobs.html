<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blob Studio — SVG Organic Shape Generator</title>
  
  <style>
    :root {
      --accent-color: #8c19d8;
      --accent-color-tint: #d1afe7;
      --color-text-primary-light: #1C1C1E; --color-text-secondary-light: #3A3A3C;
      --color-surface-light: #F5F5F7; --color-background-light: #FFFFFF;
      --color-divider-light: #EAEAEA; --color-text-primary-dark: #EAEAEB;
      --color-text-secondary-dark: #9A9A9E; --color-surface-dark: #121212;
      --color-background-dark: #1E1E1E; --color-divider-dark: #3A3A3C;
      --color-accent-text: #FFFFFF; --font-family-sans: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      --font-size-h1: 20px; --font-size-body: 14px; --font-size-caption: 12px;
      --font-weight-emphasis: 600; --font-weight-medium: 500;
      --space-3: 12px; --space-4: 16px; --space-5: 24px;
      --radius-sm: 6px; --radius-md: 8px; --radius-xl: 16px;
      --shadow-raised-2: 0 4px 12px rgba(0,0,0,0.06);
      --shadow-floating-3: 0 8px 20px rgba(0,0,0,0.12);
      --duration-standard: 200ms;
    }
    html[data-theme="light"] { --ink: var(--color-text-primary-light); --muted: var(--color-text-secondary-light); --surface: var(--color-surface-light); --surface-alt: var(--color-background-light); --border-color: var(--color-divider-light); --panel-shadow: var(--shadow-raised-2); color-scheme: light; }
    html[data-theme="dark"] { --ink: var(--color-text-primary-dark); --muted: var(--color-text-secondary-dark); --surface: var(--color-surface-dark); --surface-alt: var(--color-background-dark); --border-color: var(--color-divider-dark); --panel-shadow: 0 4px 12px rgba(0, 0, 0, 0.3); color-scheme: dark; }
    html { box-sizing: border-box; } *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; color: var(--ink); background-color: var(--surface); font: var(--font-size-body)/1.5 var(--font-family-sans); padding: 25px; }
    .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 360px 1fr; grid-template-rows: auto 1fr; gap: 25px; height: calc(100vh - 50px); }
    header.panel { grid-column: 1 / -1; height:65px; flex-shrink: 0}
    aside.panel.controls { position: sticky; top: 0; max-height: 100%; overflow-y: auto; }
    main.panel.grid { display: grid; padding: 0; min-height: 0; overflow: hidden; }
    .panel { background: var(--surface-alt); border: 1px solid var(--border-color); border-radius: var(--radius-xl); box-shadow: var(--panel-shadow); }
    header { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4); }
    header h1 { font-size: var(--font-size-h1); font-weight: var(--font-weight-emphasis); margin: 0; }
    header .sub { color: var(--muted); }
    .theme-switcher { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    
    /* Styles for the back button */
    .back-to-home {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: var(--surface);
      color: var(--ink);
      border: 1px solid var(--border-color);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all var(--duration-standard) ease;
      text-decoration: none;
    }
    .back-to-home:hover {
      background-color: var(--surface-alt);
    }
    .back-to-home svg {
      width: 18px;
      height: 18px;
    }
    
    #theme-toggle, #wiki-open-btn { width: 36px; height: 36px; padding: 0; border-radius: 50%; background-color: var(--surface); color: var(--ink); border: 1px solid var(--border-color); font-size: 18px; display: grid; place-items: center; cursor: pointer; transition: all var(--duration-standard) ease; }
    #theme-toggle:hover, #wiki-open-btn:hover { background-color: var(--surface-alt); }
    .controls { display: flex; flex-direction: column; gap: var(--space-5); padding: var(--space-5); }
    .control-group { display: flex; flex-direction: column; gap: var(--space-4); }
    .control-group + .control-group { border-top: 1px solid var(--border-color); padding-top: var(--space-5); }
    .note { font-size: var(--font-size-caption); color: var(--muted); border-top: 1px solid var(--border-color); padding-top: var(--space-4); }
    .btn { display: inline-flex; align-items: center; justify-content: center; width: 100%; cursor: pointer; font-weight: var(--font-weight-emphasis); font-size: 14px; border-radius: var(--radius-md); height: 40px; padding: 0 var(--space-4); border: 1px solid transparent; transition: all var(--duration-standard) ease; }
    .btn-primary { background-color: var(--accent-color); color: var(--color-accent-text); }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-secondary { background-color: var(--accent-color-tint); color: var(--accent-color); border-color: transparent; }
    .btn-secondary:hover { filter: brightness(0.95); }
    .num-input { background: var(--surface); color: var(--ink); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 0 var(--space-3); height: 36px; width: 60px; text-align: right; }
    .btn:focus-visible, input:focus-visible, select:focus-visible, button:focus-visible { outline: 2px solid var(--accent-color); outline-offset: 2px; }
    .slider-row { display: flex; align-items: center; gap: var(--space-4); }
    .slider-row label { flex: 0 0 90px; }
    .slider-row input[type="range"] { flex: 1 1 auto; }
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; margin: 0; background: transparent; padding: 0; border: none; cursor: pointer; height: 16px; }
    input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: var(--surface); border-radius: 2px; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 16px; width: 16px; background: var(--surface-alt); border-radius: 50%; border: 2px solid var(--accent-color); margin-top: -6px; }
    main.panel.grid { background-size: 40px 40px; background-image: linear-gradient(to right, var(--border-color) 1px, transparent 1px), linear-gradient(to bottom, var(--border-color) 1px, transparent 1px); }
    .stage { width: 100%; height: 100%; }
    svg { display: block; width: 100%; height: 100%; }
    #blob { fill: var(--accent-color); transition: fill var(--duration-standard) ease; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border-width: 0; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background-color: var(--ink); color: var(--surface-alt); padding: var(--space-3) var(--space-5); border-radius: var(--radius-md); font-weight: var(--font-weight-emphasis); font-size: 14px; box-shadow: var(--shadow-floating-3); z-index: 1000; opacity: 0; visibility: hidden; transition: all 300ms ease; }
    .toast.show { bottom: 30px; opacity: 1; visibility: visible; }
    /* Wiki Modal Styles */
    .popup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; display: none; }
    .popup-overlay.show { display: flex; align-items: center; justify-content: center; }
    .wiki-modal-content { background: var(--surface-alt); border-radius: var(--radius-xl); box-shadow: var(--shadow-floating-3); z-index: 2001; width: 800px; max-width: 90vw; max-height: 80vh; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
    .wiki-header { display: flex; justify-content: space-between; align-items: center; padding: var(--space-4); border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .wiki-header h3 { margin: 0; }
    #wiki-close-btn { background: none; border: none; font-size: 24px; line-height: 1; padding: 0; width: 36px; height: 36px; border-radius: 50%; color: var(--muted); cursor: pointer; }
    #wiki-close-btn:hover { background-color: var(--surface); color: var(--ink); }
    #wiki-content { padding: var(--space-5); overflow-y: auto; flex-grow: 1; }
    #wiki-content h4 { margin-top: var(--space-5); margin-bottom: var(--space-3); }
    #wiki-content h4:first-child { margin-top: 0; }
    @media (max-width: 800px) { body { padding: var(--space-4); } .container { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; height: auto; gap: var(--space-4); } aside.controls { position: static; max-height: none; } main.grid { min-height: 50vh; } }
  </style>
</head>
<body>
  <div class="container">
    <header class="panel">
      <a href="../index.html" class="back-to-home" title="Return to Home">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </a>
      <h1>Blob Studio</h1>
      <div class="sub">Smooth, exportable SVG blobs.</div>
      <div class="theme-switcher">
        <button id="wiki-open-btn" title="Info">ⓘ</button>
        <button id="theme-toggle" title="Change theme"></button>
      </div>
    </header>
    <aside class="panel controls" id="controls">
      <div class="control-group">
        <button class="btn btn-secondary" id="randomize">Generate</button>
      </div>
      <div class="control-group">
        <div class="slider-row">
          <label for="points">Points</label>
          <input id="points" type="range" min="3" max="9" value="5" step="1">
          <input class="num-input" id="points_num" type="number" min="3" max="9" step="1" value="5">
        </div>
        <div class="slider-row">
          <label for="smooth">Smoothness</label>
          <input id="smooth" type="range" min="0.8" max="1.5" value="1.05" step="0.05">
          <input class="num-input" id="smooth_num" type="number" min="0.8" max="1.5" step="0.05" value="1.05">
        </div>
        <div class="slider-row">
          <label for="variance">Variance</label>
          <input id="variance" type="range" min="0.1" max="0.5" value="0.39" step="0.01">
          <input class="num-input" id="variance_num" type="number" min="0.1" max="0.5" step="0.01" value="0.39">
        </div>
      </div>
      <div class="control-group" style="margin-top: auto;">
        <button class="btn btn-primary download-svg">Download</button>
      </div>
      <div class="note">Tip: Share the URL to share your blob shape, otherwise you will lose it forever!</div>
    </aside>
    <main class="grid panel" id="canvas-container">
      <div class="stage">
        <svg id="svg" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Blob preview">
          <path id="blob" d=""/>
        </svg>
      </div>
    </main>
  </div>
  
  <div id="toast" class="toast"></div>
  <div class="visually-hidden" aria-live="polite" id="aria-notifications"></div>

  <div id="wiki-overlay" class="popup-overlay">
      <div class="wiki-modal-content" role="dialog" aria-labelledby="wiki-title">
          <div class="wiki-header">
            <h3 id="wiki-title">Info</h3>
            <button id="wiki-close-btn" title="Close">×</button>
          </div>
          <div id="wiki-content"></div>
      </div>
  </div>

  <script type="module">
    // --- UTILITY FUNCTIONS ---
    function mulberry32(a) { return function() { let t = a += 0x6D2B79F5; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
    function randInt(min, max) { return Math.floor(min + Math.random() * (max - min + 1)); }
    function randFloat(min, max) { return min + Math.random() * (max - min); }
    
    // Generates a Catmull-Rom spline path data (d attribute) for SVG, closed and converted to Bezier
    function closedCRtoBezier(points, tension) {
      const n = points.length;
      if (n < 2) return ''; // Needs at least 2 points to draw a line, 3 for a curve

      let d = `M ${points[0].x.toFixed(2)} ${points[0].y.toFixed(2)}`;

      for (let i = 0; i < n; i++) {
        // Points for the Catmull-Rom segment
        const p0 = points[(i - 1 + n) % n]; // Previous point (wraps around)
        const p1 = points[i];               // Current point
        const p2 = points[(i + 1) % n];     // Next point (wraps around)
        const p3 = points[(i + 2) % n];     // Point after next (wraps around)

        // Calculate control points for cubic Bezier curve approximation
        // c1 is the first control point, c2 is the second
        const c1x = p1.x + (p2.x - p0.x) * (tension / 6);
        const c1y = p1.y + (p2.y - p0.y) * (tension / 6);

        const c2x = p2.x - (p3.x - p1.x) * (tension / 6);
        const c2y = p2.y - (p3.y - p1.y) * (tension / 6);

        // Append cubic Bezier segment to the path
        d += ` C ${c1x.toFixed(2)} ${c1y.toFixed(2)} ${c2x.toFixed(2)} ${c2y.toFixed(2)} ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
      }
      return d + ' Z'; // Close the path
    }

    // Generates randomized points around a center within a radius
    function generatePoints({ seed, points, radius, variance, center }) {
      const rand = mulberry32(seed); // Use a seeded random for consistent shapes
      const pts = [];
      for (let i = 0; i < points; i++) {
        const a = i * (Math.PI * 2 / points); // Angle for the point
        // Apply variance to the radius for organic distortion
        const r = radius * (1 + (rand() * 2 - 1) * variance); 
        pts.push({ 
            x: center.x + Math.cos(a) * r, 
            y: center.y + Math.sin(a) * r 
        });
      }
      return pts;
    }

    const adjectives = [ 'blobby','gooey','squishy','wobbly','fluffy', 'round', 'organic', 'smooth', 'lumpy', 'bumpy' ];
    const nouns = [ 'blob','glob','glorp','gloop', 'shape', 'form', 'mass', 'spot', 'splat' ];

    // --- WIKI DATA ---
    const WIKI_DATA = {
        "title": "Blob Studio Info",
        "sections": [
            {
                "title": "How to Use",
                "content": [
                    "<b>1. Generate Blobs:</b> Click the 'Generate' button to create a new random blob shape.",
                    "<b>2. Adjust Parameters:</b> Use the sliders or input fields for 'Points', 'Smoothness', and 'Variance' to fine-tune your blob's appearance:",
                    "  - <b>Points:</b> Controls the number of anchor points that define the blob's shape (3-9). More points generally lead to more complex shapes.",
                    "  - <b>Smoothness:</b> Determines how smoothly the curves connect between points. Higher values create rounder, more organic shapes.",
                    "  - <b>Variance:</b> Controls the randomness of each point's distance from the center. Higher variance results in more irregular, 'spiky' blobs.",
                    "<b>3. Download:</b> Click the 'Download' button to save your current blob as an SVG file."
                ]
            },
            {
                "title": "What is an SVG Blob?",
                "content": [
                    "An SVG (Scalable Vector Graphics) blob is a graphic element that represents an organic, often irregular, shape. Unlike raster images (like JPEGs or PNGs) that are made of pixels, SVGs are defined by mathematical paths. This means they can be scaled to any size without losing quality or becoming pixelated.",
                    "Blobs are popular in modern web design and UI/UX for adding a playful, fluid, and distinctive aesthetic. They can be used as background elements, decorative accents, or even masks for images."
                ]
            }
        ]
    };

    // --- MAIN APP LOGIC ---
    const BlobApp = {
      state: { 
        seed: 380098792, 
        points: 5, 
        variance: 0.39, 
        smooth: 1.05
      }, 
      el: {}, // Cached DOM elements
      THEMES: ['light', 'dark', 'system'],
      THEME_ICONS: { light: '☀️', dark: '🌔', system: '⚙️' },
      FIXED_FILL: '#8c19d8', // Fixed fill color for SVG export
      canvasSize: { width: 0, height: 0 }, // Current size of the SVG canvas
      isWikiLoaded: false, // Flag for wiki content loading

      // Initializes the application
      init() {
        this.cacheDOMElements();
        this.initTheme();
        this.initResizeObserver();
        this.loadStateFromURL();
        this.syncUIToState();
        this.bindEvents();
        this.render(); // Initial render of the blob
      },

      // Caches all necessary DOM elements into this.el object
      cacheDOMElements() {
        const ids = [
          'randomize', 'points', 'points_num', 'variance', 'variance_num', 'smooth', 'smooth_num',
          'svg', 'blob', 'toast', 'aria-notifications', 'theme-toggle', 'canvas-container', 'controls',
          'wiki-open-btn', 'wiki-overlay', 'wiki-close-btn', 'wiki-title', 'wiki-content'
        ];
        ids.forEach(id => {
          const element = document.getElementById(id);
          if (element) {
            // Convert kebab-case ID to camelCase for property name in this.el
            const camelCaseKey = id.replace(/-(\w)/g, (_, char) => char.toUpperCase());
            this.el[camelCaseKey] = element;
          } else {
            console.warn(`Element with ID "${id}" not found.`); 
          }
        });
        
        // Handle downloadSvgBtns separately as it's a querySelectorAll
        if (this.el.controls) { 
            this.el.downloadSvgBtns = this.el.controls.querySelectorAll('.download-svg');
        } else {
            console.warn("Element #controls not found, cannot find .download-svg buttons.");
            this.el.downloadSvgBtns = []; 
        }
      },

      // Sets up a ResizeObserver to update canvas size on container resize
      initResizeObserver() {
        const observer = new ResizeObserver(entries => {
          for (const entry of entries) {
            const { width, height } = entry.contentRect;
            this.canvasSize = { width, height };
            if (this.el.svg) { 
                this.el.svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
            }
            this.render(); // Re-render on resize to adjust blob size
          }
        });
        if (this.el.canvasContainer) { 
            observer.observe(this.el.canvasContainer);
        } else {
            console.warn("Element #canvas-container not found for ResizeObserver.");
        }
      },

      // Binds all event listeners
      bindEvents() {
        if (this.el.controls) { 
            this.el.controls.addEventListener('input', e => {
              if (!e.target || !e.target.id || e.target.type === 'button') return; 
              const { id, value } = e.target;
              const stateKey = id.replace('_num', ''); 
              if(this.state.hasOwnProperty(stateKey)) {
                this.state[stateKey] = +value;
              }
              this.syncUIProperty(stateKey);
              this.render(); // Direct render
              this.updateURL(); // Direct URL update
            });
        } else {
            console.warn("Elemento #controls no encontrado para el binding de eventos input.");
        }
        
        if (this.el.randomize) { 
            this.el.randomize.addEventListener('click', () => this.randomizeShape());
        } else {
            console.warn("Elemento #randomize no encontrado para el binding de eventos.");
        }
        
        if (this.el.themeToggle) { 
            this.el.themeToggle.addEventListener('click', () => this.cycleTheme());
        } else {
            console.warn("Elemento #theme-toggle no encontrado para el binding de eventos.");
        }

        this.el.downloadSvgBtns.forEach(btn => {
            if (btn) { 
                btn.addEventListener('click', () => this.downloadSvg());
            }
        });
        
        // Wiki modal events 
        if (this.el.wikiOpenBtn) {
            this.el.wikiOpenBtn.addEventListener('click', (e) => { e.preventDefault(); this.openWiki(); });
        } else {
            console.warn("Elemento #wiki-open-btn no encontrado para el binding de eventos.");
        }

        if (this.el.wikiCloseBtn) {
            this.el.wikiCloseBtn.addEventListener('click', () => this.closeWiki());
        } else {
            console.warn("Elemento #wiki-close-btn no encontrado para el binding de eventos.");
        }

        if (this.el.wikiOverlay) {
            this.el.wikiOverlay.addEventListener('click', (e) => { if(e.target === this.el.wikiOverlay) this.closeWiki(); });
        } else {
            console.warn("Elemento #wiki-overlay no encontrado para el binding de eventos.");
        }
      },

      // Initializes the theme (light/dark/system)
      initTheme() {
        const savedTheme = localStorage.getItem('creative-toolkit-theme') || 'system';
        this.setTheme(savedTheme, false); // Set theme without saving again
        // Listen for system theme changes if 'system' is selected
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
          if (localStorage.getItem('creative-toolkit-theme') === 'system') {
            this.applyTheme('system');
          }
        });
      },

      // Sets the current theme
      setTheme(theme, save = true) {
        if (save) {
          localStorage.setItem('creative-toolkit-theme', theme);
        }
        if (this.el.themeToggle) { 
            this.el.themeToggle.textContent = this.THEME_ICONS[theme];
        }
        this.applyTheme(theme);
      },

      // Cycles through available themes
      cycleTheme() {
        const currentTheme = localStorage.getItem('creative-toolkit-theme') || 'system';
        const currentIndex = this.THEMES.indexOf(currentTheme);
        const nextTheme = this.THEMES[(currentIndex + 1) % this.THEMES.length];
        this.setTheme(nextTheme);
      },

      // Applies the selected theme to the document
      applyTheme(theme) {
        if (theme === 'system') {
          const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.dataset.theme = systemPrefersDark ? 'dark' : 'light';
        } else {
          document.documentElement.dataset.theme = theme;
        }
      },

      // Main render function for the blob animation
      render() {
        if (!this.el.blob || !this.el.svg) { 
            console.warn("SVG o elemento blob no encontrado, no se puede renderizar.");
            return;
        }

        const oldPath = this.el.blob.getAttribute('d'); // Get the currently rendered path
        
        // Calculate the new blob path based on current state parameters
        const radius = Math.min(this.canvasSize.width, this.canvasSize.height) * 0.25;
        const center = { x: this.canvasSize.width / 2, y: this.canvasSize.height / 2 };
        const generationParams = { ...this.state, radius, center };
        const points = generatePoints(generationParams);
        const newPath = closedCRtoBezier(points, this.state.smooth);

        // If it's the first render, or the new path is identical, just set it directly.
        // This is the condition that sometimes causes a "jump" instead of animation,
        // but it's the original behavior you wanted to revert to.
        if (!oldPath || oldPath === newPath) { 
          this.el.blob.setAttribute('d', newPath);
          return;
        }

        // Remove any existing <animate> elements to avoid conflicts
        // This was already present in the "working" version
        Array.from(this.el.blob.children).forEach(child => {
            if (child.tagName === 'animate') {
                child.remove();
            }
        });

        // Create and configure the new <animate> element
        const animateEl = document.createElementNS('http://www.w3.org/2000/svg', 'animate');
        animateEl.setAttribute('attributeName', 'd');
        animateEl.setAttribute('from', oldPath);             
        animateEl.setAttribute('to', newPath);                
        animateEl.setAttribute('dur', '0.5s');                // Original duration
        animateEl.setAttribute('fill', 'freeze');             
        animateEl.setAttribute('calcMode', 'spline');         
        animateEl.setAttribute('keyTimes', '0; 1');           
        animateEl.setAttribute('keySplines', '0.16 1 0.3 1'); 

        // Event listener for when the animation ends
        animateEl.addEventListener('endEvent', () => {
          this.el.blob.setAttribute('d', newPath); // Ensure path is permanently set to final state
          // this.el.blob.innerHTML = ''; // Original code sometimes removed the animate element this way
          animateEl.remove(); // Explicitly remove the animate element
        });

        // Append the animation and start it
        this.el.blob.appendChild(animateEl);
        animateEl.beginElement();
      },

      // Loads blob state from URL hash parameters
      loadStateFromURL() {
        if (!window.location.hash) return;
        try {
          const params = new URLSearchParams(window.location.hash.substring(1));
          for (const [key, value] of params) {
            if (this.state.hasOwnProperty(key)) {
              this.state[key] = isNaN(Number(value)) ? value : Number(value);
            }
          }
        } catch (error) {
          console.error("Failed to parse state from URL hash.", error);
        }
      },

      // Updates the URL hash with current blob state
      updateURL() {
        const params = new URLSearchParams(this.state);
        window.location.hash = params.toString();
      },

      // Synchronizes UI elements with the current application state
      syncUIToState() {
        for (const key in this.state) {
          const elRange = document.getElementById(key); 
          const elNum = document.getElementById(`${key}_num`); 

          if (this.state.hasOwnProperty(key)) {
              const value = this.state[key];
              if (elRange) elRange.value = value;
              if (elNum) elNum.value = value;
          }
        }
      },

      // Randomizes blob parameters and triggers a render
      randomizeShape() {
        this.state.seed = randInt(1, 2 ** 31);
        this.state.points = randInt(3, 9);
        this.state.variance = randFloat(0.1, 0.5);
        this.state.smooth = randFloat(0.8, 1.5);
        this.syncUIToState();
        this.render(); // Direct render
        this.updateURL(); // Direct URL update
      },

      // Displays a transient toast message
      showToast(message) {
        if (this.el.toast) { 
            this.el.toast.textContent = message;
            this.el.toast.classList.add('show');
            this.updateAriaLive(message);
            setTimeout(() => this.el.toast.classList.remove('show'), 2000);
        }
      },

      // Updates ARIA live region for accessibility notifications
      updateAriaLive(message) {
        if (this.el.ariaNotifications) { 
            this.el.ariaNotifications.textContent = message;
        }
      },

      // Generates the SVG string for download
      currentSvgText() {
        if (!this.el.blob) {
            console.warn("Blob element not found, cannot generate SVG.");
            return '';
        }
        
        const currentPath = this.el.blob.getAttribute('d');
        if (!currentPath) {
            console.warn("No blob path available to export.");
            return '';
        }

        // Create a temporary path element to accurately calculate its bounding box
        const tempSvgContainer = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        const tempPathElement = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        tempPathElement.setAttribute('d', currentPath);
        tempSvgContainer.appendChild(tempPathElement);
        // Append temporarily to the DOM to ensure getBBox() returns correct values
        tempSvgContainer.style.position = 'absolute';
        tempSvgContainer.style.visibility = 'hidden';
        document.body.appendChild(tempSvgContainer);
        
        const tempBBox = tempPathElement.getBBox();
        document.body.removeChild(tempSvgContainer);

        const padding = 2;
        const x = tempBBox.x - padding;
        const y = tempBBox.y - padding;
        const w = Math.round(tempBBox.width) + (padding * 2);
        const h = Math.round(tempBBox.height) + (padding * 2);
        
        const finalPathElement = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        finalPathElement.setAttribute('d', currentPath);
        finalPathElement.setAttribute('transform', `translate(${-x}, ${-y})`);
        finalPathElement.setAttribute('fill', this.FIXED_FILL);
        const pathString = finalPathElement.outerHTML;

        const viewBox = `0 0 ${w} ${h}`;
        const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="${viewBox}" width="${w}" height="${h}">${pathString}</svg>`;
        return `<?xml version="1.0" standalone="no"?>\n${svg}`;
      },

      // Triggers the download of the generated SVG file
      downloadSvg() {
        const rand = mulberry32(this.state.seed);
        const randomAdjective = adjectives[Math.floor(rand() * adjectives.length)];
        const randomNoun = nouns[Math.floor(rand() * nouns.length)];
        const filename = `${randomAdjective}-${randomNoun}.svg`;

        const blob = new Blob([this.currentSvgText()], { type: 'image/svg+xml' });
        this.triggerDownload(URL.createObjectURL(blob), filename);
      },

      // Helper to trigger a file download
      triggerDownload(url, filename) {
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 0);
      },

      // Wiki Modal Methods
      openWiki() {
          if (!this.isWikiLoaded && this.el.wikiContent && this.el.wikiTitle) { 
              this.el.wikiTitle.textContent = WIKI_DATA.title;
              this.el.wikiContent.innerHTML = ''; 
              WIKI_DATA.sections.forEach(s => {
                  const h4 = document.createElement('h4');
                  h4.textContent = s.title;
                  this.el.wikiContent.appendChild(h4);
                  s.content.forEach(c => {
                      const p = document.createElement('p');
                      p.innerHTML = c;
                      this.el.wikiContent.appendChild(p);
                  });
              });
              this.isWikiLoaded = true;
          }
          if (this.el.wikiOverlay) { 
              this.el.wikiOverlay.classList.add('show');
          }
      },

      closeWiki() {
          if (this.el.wikiOverlay) { 
              this.el.wikiOverlay.classList.remove('show');
          }
      },
    };
    
    // Ensure BlobApp.init() is called only after the DOM is fully loaded
    document.addEventListener('DOMContentLoaded', () => BlobApp.init());
  </script>
